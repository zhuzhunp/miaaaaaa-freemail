name = "miaaaaaa-freemail"
# name = "mail-exhibit"
main = "src/server.js"
compatibility_date = "2024-01-01"
keep_vars=true

# D1 数据库绑定
[[d1_databases]]
binding = "TEMP_MAIL_DB"
database_name = "maill_free_db" #你的d1数据库名称
database_id = "ea7df6c6-f35f-402e-8f77-cee7829be366" # 你的database_id
# 登录会话过期时间（单位：天，默认7天）
# 环境变量
[vars]
# FORWARD_RULES="[{"prefix":"vip","email":"a@example.com"},{"prefix":"*","email":"example@qq.com"}]"
ADMIN_NAME="admin"
ADMIN_PASSWORD="pj9H756MZ8SPrha4vfYyupR2"
GUEST_PASSWORD="guest"
JWT_TOKEN="XzjhPPEQcb5hOcOUF4imUVActahXPcC9QTQlB4YuDn8"
JWT_TOKENGUEST_PASSWORD="ckP8SP_J11l4_AszG-yrRxST5Tl0xs9V"
SESSION_EXPIRE_DAYS="365"
MAIL_DOMAIN="miaaaaaa.cloud"
RESEND_API_KEY="disabled"



# 静态资源目录（Workers + Assets）
[assets]
directory = "public"
# 显式指定绑定名，确保在 Worker 中通过 env.ASSETS 可用
binding = "ASSETS"


# R2 存储桶绑定（用于保存完整 EML 内容）
[[r2_buckets]]
binding = "MAIL_EML"
bucket_name = "mail-eml"

